<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>Census Tract Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="./style.css"/>
  </head>
  <body>
    <div id="map"></div>
    <div id="searchContainer">
      <div class="search-group">
        <label>State</label>
        <input list="stateList" id="stateSearch" placeholder="Search State...">
        <datalist id="stateList"></datalist>
      </div>
      <div class="search-group">
        <label>County</label>
        <input list="countyList" id="countySearch" placeholder="Select a state first..." disabled>
        <datalist id="countyList"></datalist>
      </div>
      <div class="search-group">
        <label>Tract</label>
        <input list="tractList" id="tractSearch" placeholder="Select a county first..." disabled>
        <datalist id="tractList"></datalist>
      </div>
      <div class="search-group">
        <label>Heatmap Ethnicity</label>
        <input list="ethList" id="ethSearch" placeholder="Search Ethnicity...">
        <datalist id="ethList"></datalist>
        <button id="clearHeatmap" style="display:none; font-size:9px;">Reset to Dominant</button>
      </div>
    </div>
    <button id="backButton" style="display: none;">&larr; Back</button>
    <div id="infoPanel" class="hidden">
      <button id="closePanel">&times;</button>
      <div id="statsContent"></div>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
